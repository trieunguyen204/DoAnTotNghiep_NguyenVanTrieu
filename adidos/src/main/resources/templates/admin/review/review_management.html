<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin :: layout}">

<head>
    <title>Quản lý đánh giá</title>

    <th:block th:fragment="page_admin_css">
        <link rel="stylesheet" th:href="@{/css/admin/review-management.css}">
    </th:block>
</head>

<body>
<th:block th:fragment="content">
    <div class="admin-review-page">

        <div class="page-header">
            <div>
                <h1>Quản lý đánh giá</h1>
                <p>Admin chỉ được phản hồi, không xóa hoặc ẩn đánh giá của khách hàng.</p>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div th:if="${#lists.isEmpty(reviews)}" class="empty-box">
            Chưa có đánh giá nào.
        </div>

        <div class="review-list" th:unless="${#lists.isEmpty(reviews)}">
            <div class="review-card" th:each="review : ${reviews}">

                <div class="review-header">
                    <img th:src="${review.avatarUrl != null && !review.avatarUrl.isEmpty() ? review.avatarUrl : '/images/default-avatar.png'}"
                         alt="Avatar">

                    <div>
                        <strong th:text="${review.userName}"></strong>

                        <div class="review-stars" th:if="${review.rating != null}">
                            <span th:each="i : ${#numbers.sequence(1, review.rating)}">★</span>
                        </div>

                        <small th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm')}"></small>
                    </div>
                </div>

                <div class="review-product-info">
                    <span>Sản phẩm:</span>

                    <a th:if="${review.productId != null}"
                       th:href="@{/product/{id}(id=${review.productId})}"
                       target="_blank"
                       th:text="${review.productName}">
                    </a>

                    <strong th:if="${review.productId == null}"
                            th:text="${review.productName}">
                    </strong>
                </div>

                <p class="review-variant"
                   th:if="${review.variantInfo != null}"
                   th:text="${'Phân loại: ' + review.variantInfo}">
                </p>

                <p class="review-comment" th:text="${review.comment}"></p>

                <div class="admin-replies"
                     th:if="${review.replies != null and !#lists.isEmpty(review.replies)}">

                    <div class="admin-reply" th:each="reply : ${review.replies}">
                        <strong>Adidos phản hồi:</strong>
                        <p th:text="${reply.comment}"></p>
                        <small th:text="${#temporals.format(reply.createdAt, 'dd/MM/yyyy HH:mm')}"></small>
                    </div>

                </div>

                <form th:action="@{/admin/reviews/{id}/reply(id=${review.id})}"
                      method="post"
                      class="reply-form">

                    <textarea name="content"
                              placeholder="Nhập phản hồi của shop..."
                              required></textarea>

                    <button type="submit">
                        Gửi phản hồi
                    </button>
                </form>

            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="page_js">
    <script th:src="@{/js/admin/review-management.js}"></script>
</th:block>
</body>
</html>
