<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin :: layout}">

<head>
    <title>Quản lý đơn hàng</title>
    <th:block th:fragment="page_admin_css">
        <link rel="stylesheet" th:href="@{/css/admin/order-management.css}">
    </th:block>
</head>

<body>
<th:block th:fragment="content">
    <div class="admin-page">
        <h2>Quản lý đơn hàng</h2>

        <div class="archive-box">
            <h3>Lưu trữ đơn hàng cũ</h3>

            <form th:action="@{/admin/orders/archive}" method="post"
                  onsubmit="return confirm('Chỉ các đơn ĐÃ GIAO trước ngày đã chọn sẽ được export ra ZIP và xóa khỏi DB chính. Tiếp tục?')">

                <label> Xóa các đơn hàng cũ đến thời điểm :</label>
                <input type="date" name="archivedUntil" required>

                <button type="submit" class="btn-primary">
                    Lưu trữ & xóa
                </button>

                <a th:href="@{/admin/orders/archive/logs}" class="btn-secondary">
                    Lịch sử lưu trữ
                </a>
            </form>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="order-toolbar">
            <form th:action="@{/admin/orders}" method="get">
                <select name="status" onchange="this.form.submit()">
                    <option value="ALL"
                            th:selected="${currentStatus == null || currentStatus == 'ALL'}">
                        Tất cả
                    </option>

                    <option th:each="s : ${statuses}"
                            th:value="${s}"
                            th:text="${s.name() == 'PENDING' ? 'Chờ xác nhận' :
                             (s.name() == 'PROCESSING' ? 'Đang chuẩn bị' :
                             (s.name() == 'SHIPPING' ? 'Đang giao hàng' :
                             (s.name() == 'DELIVERED' ? 'Đã giao' :
                             (s.name() == 'CANCELLED' ? 'Đã hủy' : s.name()))))}"
                            th:selected="${currentStatus == s.name()}">
                    </option>
                </select>
            </form>
        </div>

        <input type="hidden" name="currentStatus" th:value="${currentStatus}">

        <table class="order-table">
            <thead>
            <tr>
                <th>Mã đơn</th>
                <th>Người nhận</th>
                <th>SĐT</th>
                <th>Tổng tiền</th>
                <th>Thanh toán</th>
                <th>Thao tác</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${order.receiverName}"></td>
                <td th:text="${order.receiverPhone}"></td>

                <td th:text="${#numbers.formatDecimal(order.finalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>

                <td>
                    <span th:text="${order.paymentMethod}"></span>
                    -
                    <strong th:text="${order.paymentStatus.name() == 'PAID' ? 'Đã thanh toán' :
                     (order.paymentStatus.name() == 'UNPAID' ? 'Chưa thanh toán' :
                     (order.paymentStatus.name() == 'FAILED' ? 'Thanh toán thất bại' :
                     order.paymentStatus))}">
                    </strong>
                </td>


                <td class="action-col">
                    <a th:href="@{/admin/orders/detail/{id}(id=${order.id}, status=${currentStatus})}"
                       class="btn-secondary">
                        Chi tiết
                    </a>

                    <form th:if="${order.orderStatus.name() != 'DELIVERED' && order.orderStatus.name() != 'CANCELLED'}"
                          th:action="@{/admin/orders/next-status/{id}(id=${order.id})}"
                          method="post">
                        <input type="hidden" name="currentStatus" th:value="${currentStatus}">

                        <button type="submit"
                                class="btn-primary next-status-btn"
                                th:text="'➜'"
                                th:title="${order.orderStatus.name() == 'PENDING' ? 'Chuyển sang Đang chuẩn bị' :
                                      (order.orderStatus.name() == 'PROCESSING' ? 'Chuyển sang Đang giao hàng' :
                                      (order.orderStatus.name() == 'SHIPPING' ? 'Hoàn tất đơn hàng' :
                                      'Chuyển trạng thái'))}">
                        </button>
                    </form>

                    <form th:if="${order.orderStatus.name() == 'PENDING'}"
                          th:action="@{/admin/orders/cancel/{id}(id=${order.id})}"
                          method="post">
                        <input type="hidden" name="currentStatus" th:value="${currentStatus}">
                        <button type="submit"
                                class="btn-secondary"
                                onclick="return confirm('Bạn chắc chắn muốn hủy đơn này?')">
                            Hủy
                        </button>
                    </form>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(orders)}">
                <td colspan="6">Không có đơn hàng nào</td>
            </tr>
            </tbody>
        </table>
    </div>
</th:block>

<th:block th:fragment="page_js">
    <script th:src="@{/js/admin/order-management.js}"></script>
</th:block>
</body>
</html>
