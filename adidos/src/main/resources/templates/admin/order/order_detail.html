<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin :: layout}">

<head>
    <title>Chi tiết đơn hàng</title>
    <th:block th:fragment="page_admin_css">
        <link rel="stylesheet" th:href="@{/css/admin/order-management.css}">
    </th:block>
</head>

<body>
<th:block th:fragment="content">
    <div class="admin-page">
        <h2>Chi tiết đơn hàng #<span th:text="${order.id}"></span></h2>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="detail-card">
            <p><strong>Người nhận:</strong> <span th:text="${order.receiverName}"></span></p>
            <p><strong>SĐT:</strong> <span th:text="${order.receiverPhone}"></span></p>
            <p><strong>Địa chỉ:</strong> <span th:text="${order.shippingAddress}"></span></p>

            <p>
                <strong>Thanh toán:</strong>
                <span th:text="${order.paymentMethod}"></span>
                -
                <strong th:text="${order.paymentStatus == null ? '---' :
                 (order.paymentStatus.name() == 'PAID' ? 'Đã thanh toán' :
                 (order.paymentStatus.name() == 'UNPAID' ? 'Chưa thanh toán' :
                 (order.paymentStatus.name() == 'FAILED' ? 'Thanh toán thất bại' :
                 order.paymentStatus)))}">
                </strong>
            </p>

            <p>
                <strong>Trạng thái đơn:</strong>

                <span class="status-badge"
                      th:text="${order.orderStatus.name() == 'PENDING' ? 'Chờ xác nhận' :
                   (order.orderStatus.name() == 'PROCESSING' ? 'Đang chuẩn bị' :
                   (order.orderStatus.name() == 'SHIPPING' ? 'Đang giao hàng' :
                   (order.orderStatus.name() == 'DELIVERED' ? 'Đã giao' :
                   (order.orderStatus.name() == 'CANCELLED' ? 'Đã hủy' :
                   order.orderStatus))))}">
                </span>
            </p>

        </div>

        <table class="order-table">
            <thead>
            <tr>
                <th>Sản phẩm</th>
                <th>Màu</th>
                <th>Size</th>
                <th>Đơn giá</th>
                <th>SL</th>
                <th>Tạm tính</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="item : ${order.items}">
                <td th:text="${item.productName}"></td>
                <td th:text="${item.color}"></td>
                <td th:text="${item.size}"></td>
                <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                <td th:text="${item.quantity}"></td>
                <td th:text="${#numbers.formatDecimal(item.subTotal, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
            </tr>
            </tbody>
        </table>

        <div class="detail-total">
            <p>Tổng hàng: <strong th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></strong></p>
            <p>Phí ship: <strong th:text="${#numbers.formatDecimal(order.shippingFee, 0, 'COMMA', 0, 'POINT')} + 'đ'"></strong></p>
            <p>Giảm giá: <strong th:text="${#numbers.formatDecimal(order.discountAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></strong></p>
            <p>Thành tiền: <strong th:text="${#numbers.formatDecimal(order.finalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></strong></p>
        </div>

        <a th:href="@{/admin/orders(status=${currentStatus})}" class="btn-secondary">Quay lại</a>
    </div>
</th:block>

<th:block th:fragment="page_js">
    <script th:src="@{/js/admin/order-management.js}"></script>
</th:block>
</body>
</html>
