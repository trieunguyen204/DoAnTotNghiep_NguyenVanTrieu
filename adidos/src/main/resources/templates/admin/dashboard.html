<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin :: layout}">

<head>
    <title>Dashboard Admin</title>

    <th:block th:fragment="page_admin_css">
        <link rel="stylesheet" th:href="@{/css/admin/dashboard.css}">
    </th:block>
</head>

<body>
<th:block th:fragment="content">
    <div class="dashboard-page">

        <h2>Tổng quan hệ thống </h2>

        <div class="dashboard-stats">
            <div class="stat-card">
                <span>Tổng doanh thu</span>
                <strong th:text="${#numbers.formatDecimal(stats.totalRevenue, 0, 'COMMA', 0, 'POINT')} + 'đ'"></strong>
            </div>

            <div class="stat-card">
                <span>Tổng đơn hàng</span>
                <strong th:text="${stats.totalOrders}"></strong>
            </div>

            <div class="stat-card">
                <span>Tổng user</span>
                <strong th:text="${stats.totalUsers}"></strong>
            </div>

            <div class="stat-card">
                <span>Tổng sản phẩm</span>
                <strong th:text="${stats.totalProducts}"></strong>
            </div>
        </div>

        <hr class="dashboard-divider">

        <h2>Báo cáo theo bộ lọc</h2>

        <form method="get"
              th:action="@{/admin/dashboard}"
              class="dashboard-filter">

            <div class="filter-group">
                <label>Từ ngày</label>
                <input type="date"
                       name="startDate"
                       th:value="${startDate}">
            </div>

            <div class="filter-group">
                <label>Đến ngày</label>
                <input type="date"
                       name="endDate"
                       th:value="${endDate}">
            </div>

            <button type="submit">Lọc</button>

            <a th:href="@{/admin/dashboard}">
                Làm mới
            </a>
        </form>

        <div class="dashboard-grid">

            <!-- LEFT -->
            <div class="dashboard-section chart-section">
                <h3>Biểu đồ doanh thu</h3>

                <div class="chart-wrapper">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="dashboard-side">

                <!-- BEST -->
                <div class="dashboard-section">
                    <div class="section-header">
                        <h3>Top sản phẩm bán chạy</h3>

                    </div>

                    <table>
                        <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Đã bán</th>
                            <th>Tồn</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="p, stat : ${bestProducts}"
                            th:if="${stat.index < 4}">
                            <td th:text="${p.productName}"></td>
                            <td th:text="${p.soldQuantity}"></td>
                            <td th:text="${p.stockQuantity}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- SLOW -->
                <div class="dashboard-section">
                    <div class="section-header">
                        <h3> Sản phẩm bán ế</h3>

                    </div>

                    <table>
                        <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Đã bán</th>
                            <th>Tồn</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="p, stat : ${slowProducts}"
                            th:if="${stat.index < 4}">
                            <td th:text="${p.productName}"></td>
                            <td th:text="${p.soldQuantity}"></td>
                            <td th:text="${p.stockQuantity}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>



</th:block>

<th:block th:fragment="page_js">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">
        const revenueData = [[${revenueChart}]];

        const labels = [
            "T1", "T2", "T3", "T4",
            "T5", "T6", "T7", "T8",
            "T9", "T10", "T11", "T12"
        ];

        const values = Array(12).fill(0);

        revenueData.forEach(item => {
            const month = Number(item[0]);
            const revenue = Math.max(Number(item[1]), 0);

            if (month >= 1 && month <= 12) {
                values[month - 1] = revenue;
            }
        });

        const maxValue = Math.max(...values);
        const suggestedMax = maxValue === 0 ? 1000000 : maxValue * 1.2;

        new Chart(document.getElementById('revenueChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Doanh thu theo tháng',
                    data: values,
                    tension: 0.35,
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    borderWidth: 2,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        min: 0,
                        suggestedMax: suggestedMax,
                        ticks: {
                            callback: function(value) {
                                return new Intl.NumberFormat('vi-VN').format(value) + 'đ';
                            }
                        }
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return 'Doanh thu: ' +
                                    new Intl.NumberFormat('vi-VN').format(context.raw) + 'đ';
                            }
                        }
                    }
                }
            }
        });
    </script>
</th:block>
</body>
</html>
