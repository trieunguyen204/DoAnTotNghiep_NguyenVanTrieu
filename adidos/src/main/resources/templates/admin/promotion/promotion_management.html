<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin :: layout}">
<th:block th:fragment="page_admin_css">
    <link rel="stylesheet" th:href="@{/css/admin/promotion.css}">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
</th:block>
</th:block>

<body>
<div th:fragment="content">
    <div class="admin-header">
        <div class="breadcrumb">
            <span>Quản lý khuyến mãi</span>
        </div>
        <div class="header-actions">
            <button class="btn-add" onclick="openModal()">
                <i class="fas fa-plus"></i> Thêm khuyến mãi mới
            </button>
        </div>
    </div>

    <div class="admin-card">
        <div class="card-header">
            <h3>Danh sách chương trình khuyến mãi</h3>
        </div>
        <div class="card-body">
            <table id="promotionTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên chương trình</th>
                    <th>Loại giảm</th>
                    <th>Giá trị</th>
                    <th>Thời gian áp dụng</th>
                    <th>Trạng thái</th>
                    <th class="text-center">Hành động</th>
                </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()"></div>
    <div id="promotionModal" class="admin-modal">
        <div class="modal-header">
            <h3 id="modalTitle">Thiết lập khuyến mãi</h3>
            <span class="close-icon" onclick="closeModal()">&times;</span>
        </div>
        <form id="promotionForm">
            <input type="hidden" id="id">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Tên khuyến mãi</label>
                    <input type="text" id="promotionName" required>
                </div>
                <div class="form-group">
                    <label>Loại giảm giá</label>
                    <select id="discountType">
                        <option value="PERCENT">Phần trăm (%)</option>
                        <option value="FIXED">Tiền mặt (VNĐ)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Giá trị giảm</label>
                    <input type="number" id="discountValue" min="0" required>
                </div>
                <div class="form-group">
                    <label>Giảm tối đa (VNĐ)</label>
                    <input type="number" id="maxDiscountValue" min="0">
                </div>
                <div class="form-group">
                    <label>Độ ưu tiên</label>
                    <input type="number" id="priority" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Ngày bắt đầu</label>
                    <input type="datetime-local" id="startDate" required>
                </div>
                <div class="form-group">
                    <label>Ngày kết thúc</label>
                    <input type="datetime-local" id="endDate" required>
                </div>

                <div class="form-group full-width">
                    <label>Áp dụng cho danh mục</label>
                    <select id="categoryIds" multiple class="select2-multiple" style="width: 100%;">
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Trạng thái</label>
                    <select id="status">
                        <option value="ACTIVE">Hoạt động</option>
                        <option value="INACTIVE">Tạm dừng</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeModal()">Đóng</button>
                <button type="button" class="btn-save" onclick="savePromotion()">Xác nhận lưu</button>
            </div>
        </form>
    </div>

    <th:block th:fragment="page_js">
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
        <script th:src="@{/js/admin/discount/promotion.js}"></script>
    </th:block>
</div>
</body>
</html>
