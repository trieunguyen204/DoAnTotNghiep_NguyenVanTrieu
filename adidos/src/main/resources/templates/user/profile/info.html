<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout_user}">

<head>
    <title th:fragment="page_title">Thông tin tài khoản | Adidos</title>

    <th:block th:fragment="page_user_css">
        <link rel="stylesheet" th:href="@{/css/user/profile.css}">
    </th:block>
</head>

<body>

<th:block th:fragment="content_user">
    <div class="profile-container">
        <div th:replace="~{user/profile/sidebar :: sidebar}"></div>

        <div class="profile-content">
            <h2>Hồ sơ của tôi</h2>
            <p >Quản lý thông tin hồ sơ để bảo mật tài khoản</p>
            <hr>

            <form th:action="@{/profile/update}" method="post" th:object="${user}" enctype="multipart/form-data" class="profile-form-layout">

                <div class="profile-info-section">
                    <div class="form-group">
                        <label>Họ và tên</label>
                        <input type="text" th:field="*{fullName}" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" readonly>
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" th:field="*{phone}" required>
                    </div>
                    <div class="form-group">
                        <label>Giới tính</label>
                        <div class="gender-group">
                            <label><input type="radio" th:field="*{gender}" value="Nam"> Nam</label>
                            <label><input type="radio" th:field="*{gender}" value="Nữ"> Nữ</label>
                            <label><input type="radio" th:field="*{gender}" value="Khác"> Khác</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Ngày sinh</label>
                        <input type="date"
                               name="dob"
                               th:value="${user.dob != null ? #temporals.format(user.dob, 'yyyy-MM-dd') : ''}"
                               required>
                    </div>
                    <hr>

                    <h3 class="doipass">Đổi mật khẩu</h3>

                    <div class="form-group">
                        <label>Mật khẩu hiện tại</label>
                        <input type="password" name="oldPassword" autocomplete="current-password">
                    </div>

                    <div class="form-group">
                        <label>Mật khẩu mới</label>
                        <input type="password" name="newPassword" autocomplete="new-password">
                    </div>

                    <div class="form-group">
                        <label>Xác nhận mật khẩu mới</label>
                        <input type="password" name="confirmPassword" autocomplete="new-password">
                    </div>
                    <div>
                        <button type="submit" class="btn-save">Lưu thay đổi</button>
                    </div>
                </div>

                <div class="profile-avatar-section">
                    <img th:src="${user.avatarUrl != null && !user.avatarUrl.isEmpty() ? user.avatarUrl : '/images/default-avatar.png'}"
                         alt="Avatar" class="avatar-preview" id="avatarPreview">

                    <label class="btn-upload">
                        Chọn Ảnh
                        <input type="file" name="avatarFile" id="avatarFile" accept=".jpeg, .jpg, .png">
                    </label>

                    <p>
                        Dung lượng file tối đa 1 MB<br>Định dạng: .JPEG, .PNG
                    </p>
                </div>

            </form>
        </div>
    </div>
</th:block>
<th:block th:fragment="page_user_js">
    <script th:src="@{/js/user/profile.js}"></script>
</th:block>

</body>
</html>
