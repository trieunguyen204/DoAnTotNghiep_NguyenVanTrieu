<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout_user}">

<head>
    <title th:fragment="page_title">Đơn hàng của tôi | Adidos</title>

    <th:block th:fragment="page_user_css">
        <link rel="stylesheet" th:href="@{/css/user/profile.css}">
    </th:block>
</head>

<body>

<th:block th:fragment="content_user">
    <div class="profile-container">

        <div th:replace="~{user/profile/sidebar :: sidebar}"></div>

        <div class="profile-content">
            <h2>Đơn hàng của tôi</h2>

            <div th:if="${#lists.isEmpty(orders)}" class="empty-box">
                Bạn chưa có đơn hàng nào.
            </div>

            <table th:unless="${#lists.isEmpty(orders)}" class="table-orders">
                <thead>
                <tr>
                    <th>Mã đơn</th>
                    <th>Người nhận</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái đơn</th>
                    <th>Thanh toán</th>
                    <th></th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${'#' + order.id}"></td>

                    <td>
                        <strong th:text="${order.receiverName}"></strong>
                        <br>
                        <span th:text="${order.receiverPhone}"></span>
                    </td>

                    <td th:text="${#numbers.formatDecimal(order.finalAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>

                    <td>
                        <span th:text="${order.orderStatus}"></span>
                    </td>

                    <td>
                        <span th:text="${order.paymentStatus}"></span>
                    </td>

                    <td>
                        <a th:href="@{/profile/orders/{id}(id=${order.id})}" class="btn-link">
                            Chi tiết
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</th:block>

<th:block th:fragment="page_user_js">
    <script th:src="@{/js/user/profile.js}"></script>
</th:block>

</body>
</html>
