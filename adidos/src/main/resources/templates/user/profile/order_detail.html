<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout_user}">

<head>
    <title th:fragment="page_title">Chi tiết đơn hàng | Adidos</title>

    <th:block th:fragment="page_user_css">
        <link rel="stylesheet" th:href="@{/css/user/profile.css}">
    </th:block>
</head>

<body>

<th:block th:fragment="content_user">
    <div class="profile-container">

        <div th:replace="~{user/profile/sidebar :: sidebar}"></div>

        <div class="profile-content">
            <div class="order-detail-header">
                <h2>
                    Chi tiết đơn #
                    <span th:text="${order.id}"></span>
                </h2>

                <a th:href="@{/profile/orders}" class="btn-link">
                    ← Quay lại
                </a>
            </div>

            <div th:if="${success}" class="alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert-error" th:text="${error}"></div>

            <div class="order-info-box">
                <p>
                    <strong>Người nhận:</strong>
                    <span th:text="${order.receiverName}"></span>
                </p>

                <p>
                    <strong>Số điện thoại:</strong>
                    <span th:text="${order.receiverPhone}"></span>
                </p>

                <p>
                    <strong>Địa chỉ:</strong>
                    <span th:text="${order.shippingAddress}"></span>
                </p>

                <p>
                    <strong>Trạng thái đơn:</strong>
                    <span th:text="${order.orderStatus}"></span>
                </p>

                <p>
                    <strong>Trạng thái thanh toán:</strong>
                    <span th:text="${order.paymentStatus}"></span>
                </p>
            </div>

            <table class="table-orders">
                <thead>
                <tr>
                    <th>Sản phẩm</th>
                    <th>Phân loại</th>
                    <th>Giá</th>
                    <th>SL</th>
                    <th>Tổng</th>
                    <th>Đánh giá</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.productName}"></td>
                    <td th:text="${item.color + ' - ' + item.size}"></td>
                    <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${#numbers.formatDecimal(item.subTotal, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>

                    <td>
                        <span th:if="${item.reviewed}" class="reviewed-label">
                            Đã đánh giá
                        </span>

                        <form th:if="${order.orderStatus.name() == 'DELIVERED' and !item.reviewed}"
                              th:action="@{/reviews/add}"
                              method="post"
                              class="review-form-inline">

                            <input type="hidden" name="orderId" th:value="${order.id}">
                            <input type="hidden" name="orderItemId" th:value="${item.id}">
                            <input type="hidden" name="productId" th:value="${item.productId}">

                            <select name="rating" required>
                                <option value="">Sao</option>
                                <option value="5">5 ★</option>
                                <option value="4">4 ★</option>
                                <option value="3">3 ★</option>
                                <option value="2">2 ★</option>
                                <option value="1">1 ★</option>
                            </select>

                            <input type="text"
                                   name="comment"
                                   placeholder="Nhận xét..."
                                   required>

                            <button type="submit">Gửi</button>
                        </form>

                        <span th:if="${order.orderStatus.name() != 'DELIVERED'}" class="review-disabled">
                            Chưa thể đánh giá
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="order-total-box">
                <p>
                    <span>Tạm tính:</span>
                    <strong th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT') + 'đ'}"></strong>
                </p>

                <p>
                    <span>Phí vận chuyển:</span>
                    <strong th:text="${#numbers.formatDecimal(order.shippingFee, 0, 'COMMA', 0, 'POINT') + 'đ'}"></strong>
                </p>

                <p>
                    <span>Voucher đơn hàng:</span>
                    <strong th:text="${#numbers.formatDecimal(order.discountAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}"></strong>
                </p>

                <p class="order-final-total">
                    <span>Tổng thanh toán:</span>
                    <strong th:text="${#numbers.formatDecimal(order.finalAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}"></strong>
                </p>
            </div>

            <form th:if="${order.orderStatus.name() == 'PENDING'}"
                  th:action="@{/profile/orders/{id}/cancel(id=${order.id})}"
                  method="post"
                  class="confirm-action"
                  data-message="Bạn chắc chắn muốn hủy đơn hàng này?">

                <button type="submit" class="btn-cancel">
                    Hủy đơn hàng
                </button>
            </form>
        </div>
    </div>
</th:block>

<th:block th:fragment="page_user_js">
    <script th:src="@{/js/user/profile.js}"></script>
</th:block>

</body>
</html>
