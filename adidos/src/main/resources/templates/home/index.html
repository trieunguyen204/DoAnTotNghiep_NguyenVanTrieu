<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/main :: layout_user}">
    <head>
        <title th:fragment="page_title">Adidos | Cửa Hàng qua Cao Cấp</title>
        <th:block th:fragment="page_user_css">
            <link rel="stylesheet" th:href="@{/css/user/index.css}">
        </th:block>
    </head>
    <body>
            <th:block th:fragment="content_user">

                <section class="hero-light">
                    <div class="hero-content-light">

                    </div>
                </section>

                <div class="home-section" th:if="${topPromo != null and !topPromoProducts.isEmpty()}">
                    <h2>SALE KHỦNG: <span th:text="${topPromo.promotionName}"></span></h2>
                    <div class="product-grid">
                        <th:block th:each="product : ${topPromoProducts}">
                            <div th:replace="~{fragments/components :: product_card(${product})}"></div>
                        </th:block>
                    </div>
                    <a th:if="${topPromo != null}"
                       th:href="@{/promotions/{id}(id=${topPromo.id})}"
                       class="btn-view-all">
                        Xem tất cả
                    </a>
                </div>

                <div class="home-section" th:if="${soonPromo != null and topPromo != null and soonPromo.id != topPromo.id and !soonPromoProducts.isEmpty()}">
                    <h2>SẮP KẾT THÚC: <span th:text="${soonPromo.promotionName}"></span></h2>
                    <div class="product-grid">
                        <th:block th:each="product : ${soonPromoProducts}">
                            <div th:replace="~{fragments/components :: product_card(${product})}"></div>
                        </th:block>
                    </div>
                    <a th:if="${soonPromo != null}"
                       th:href="@{/promotions/{id}(id=${soonPromo.id})}"
                       class="btn-view-all">
                        Xem tất cả
                    </a>
                </div>

                <div class="home-section">
                    <div class="section-heading-row">
                        <div>
                            <h2>Toàn bộ sản phẩm</h2>
                            <p class="section-subtitle">
                                Khám phá các sản phẩm mới nhất tại Adidos
                            </p>
                        </div>

                        <span class="product-count"
                              th:text="'Tổng: ' + ${totalItems} + ' sản phẩm'">
        </span>
                    </div>

                    <div class="product-grid" th:if="${!allProducts.isEmpty()}">
                        <th:block th:each="product : ${allProducts}">
                            <div th:replace="~{fragments/components :: product_card(${product})}"></div>
                        </th:block>
                    </div>

                    <div class="empty-products" th:if="${allProducts.isEmpty()}">
                        Hiện chưa có sản phẩm nào.
                    </div>

                    <div class="pagination-wrap" th:if="${totalPages > 1}">
                        <a class="page-btn"
                           th:classappend="${currentPage == 0} ? ' disabled'"
                           th:href="@{/(page=${currentPage - 1}, size=${size})}">
                            Trước
                        </a>

                        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                            <a class="page-number"
                               th:classappend="${i == currentPage} ? ' active'"
                               th:text="${i + 1}"
                               th:href="@{/(page=${i}, size=${size})}">
                            </a>
                        </th:block>

                        <a class="page-btn"
                           th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
                           th:href="@{/(page=${currentPage + 1}, size=${size})}">
                            Sau
                        </a>
                    </div>
                </div>

            </th:block>

        <th:block th:fragment="page_user_js">
            <script th:src="@{/js/user/index.js}"></script>
        </th:block>
    </body>
</html>
