<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/main :: layout_user}">
    <head>
        <title th:fragment="page_title">Danh mục sản phẩm</title>
        <th:block th:fragment="page_user_css">
            <link rel="stylesheet" th:href="@{/css/user/category.css}">
            <link rel="stylesheet" th:href="@{/css/user/index.css}">
        </th:block>
    </head>
    <body>
    <div th:fragment="content_user" class="category-container">

        <div class="breadcrumb">
            <a th:href="@{/}">Trang chủ</a>
            <span class="separator">/</span>

            <th:block th:if="${category.parentId != null}">
                <a th:href="@{/category/{id}(id=${category.parentId})}" th:text="${category.parentName}">Danh mục cha</a>
                <span class="separator">/</span>
            </th:block>

            <span class="current" th:text="${category.name}">Tên Danh Mục</span>
        </div>

        <div class="category-layout">
            <aside class="sidebar-filter">
                <form th:action="@{/category/{id}(id=${category.id})}" method="GET">
                    <input type="hidden" name="page" value="0">
                    <input type="hidden" name="size" th:value="${size}">
                    <h3>Lọc sản phẩm</h3>

                    <div class="filter-group">
                        <label>Khoảng giá</label>
                        <div class="price-range">
                            <input type="number" name="minPrice" th:value="${minPrice}" placeholder="Từ"
                                   min="0" oninput="validity.valid||(value='');">

                            <input type="number" name="maxPrice" th:value="${maxPrice}" placeholder="Đến"
                                   min="0" oninput="validity.valid||(value='');">
                        </div>
                    </div>

                    <div class="filter-group filter-dropdown open">
                        <button type="button" class="filter-toggle">
                            <span>Thương hiệu</span>
                            <span class="filter-arrow">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M6 9L12 15L18 9"
                                          stroke="currentColor"
                                          stroke-width="1.8"
                                          stroke-linecap="round"
                                          stroke-linejoin="round"/>
                                </svg>
                            </span>
                        </button>

                        <div class="filter-content">
                            <label class="checkbox-item" th:each="b : ${brands}">
                                <input type="checkbox"
                                       name="brands"
                                       th:value="${b}"
                                       th:checked="${selectedBrands != null and selectedBrands.contains(b)}">
                                <span th:text="${b}"></span>
                            </label>
                        </div>
                    </div>

                    <div class="filter-group filter-dropdown">
                        <button type="button" class="filter-toggle">
                            <span>Chất liệu</span>
                            <span class="filter-arrow">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M6 9L12 15L18 9"
                                          stroke="currentColor"
                                          stroke-width="1.8"
                                          stroke-linecap="round"
                                          stroke-linejoin="round"/>
                                </svg>
                            </span>
                        </button>

                        <div class="filter-content">
                            <label class="checkbox-item" th:each="m : ${materials}">
                                <input type="checkbox"
                                       name="materials"
                                       th:value="${m}"
                                       th:checked="${selectedMaterials != null and selectedMaterials.contains(m)}">
                                <span th:text="${m}"></span>
                            </label>
                        </div>
                    </div>

                    <div class="filter-group filter-dropdown">
                        <button type="button" class="filter-toggle">
                            <span>Danh mục</span>
                            <span class="filter-arrow">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M6 9L12 15L18 9"
                                          stroke="currentColor"
                                          stroke-width="1.8"
                                          stroke-linecap="round"
                                          stroke-linejoin="round"/>
                                </svg>
                            </span>
                        </button>

                        <div class="filter-content">
                            <label class="checkbox-item" th:each="cat : ${subCategories}">
                                <input type="checkbox"
                                       name="categoryIds"
                                       th:value="${cat.id}"
                                       th:checked="${selectedCategoryIds != null and selectedCategoryIds.contains(cat.id)}">
                                <span th:text="${cat.name}"></span>
                            </label>
                        </div>
                    </div>

                    <div class="filter-group">
                        <label>Sắp xếp</label>
                        <select name="sort">
                            <option value="" th:selected="${selectedSort == null or selectedSort == ''}">
                               Mặc định
                            </option>
                            <option value="priceAsc" th:selected="${selectedSort == 'priceAsc'}">
                                Giá(thấp-cao)
                            </option>
                            <option value="priceDesc" th:selected="${selectedSort == 'priceDesc'}">
                                Giá(cao-thấp)
                            </option>
                            <option value="bestSeller" th:selected="${selectedSort == 'bestSeller'}">
                                Bán chạy nhất
                            </option>
                        </select>
                    </div>

                    <button type="submit" class="btn-filter">ÁP DỤNG</button>
                    <a th:href="@{/category/{id}(id=${category.id})}" class="btn-clear">LÀM MỚI BỘ LỌC</a>
                </form>
            </aside>

            <div class="main-content">
                <div class="product-grid" th:if="${not #lists.isEmpty(products)}">
                    <th:block th:each="product : ${products}">
                        <div th:replace="~{fragments/components :: product_card(${product})}"></div>
                    </th:block>
                </div>

                <div class="pagination-wrap" th:if="${totalPages > 1}">
                    <a class="page-btn"
                       th:classappend="${currentPage == 0} ? ' disabled'"
                       th:href="@{/category/{id}(
                                id=${category.id},
                                page=${currentPage - 1},
                                size=${size},
                                minPrice=${minPrice},
                                maxPrice=${maxPrice},
                                brand=${selectedBrand},
                                material=${selectedMaterial}
                           )}">
                        Trước
                    </a>

                    <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                        <a class="page-number"
                           th:classappend="${i == currentPage} ? ' active'"
                           th:text="${i + 1}"
                           th:href="@{/category/{id}(
                                id=${category.id},
                                page=${i},
                                size=${size},
                                minPrice=${minPrice},
                                maxPrice=${maxPrice},
                                brand=${selectedBrand},
                                material=${selectedMaterial}
                           )}">
                        </a>
                    </th:block>

                    <a class="page-btn"
                       th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
                       th:href="@{/category/{id}(
                                id=${category.id},
                                page=${currentPage + 1},
                                size=${size},
                                minPrice=${minPrice},
                                maxPrice=${maxPrice},
                                brand=${selectedBrand},
                                material=${selectedMaterial}
                           )}">
                        Sau
                    </a>
                </div>

                <div th:if="${#lists.isEmpty(products)}" class="empty-msg">
                    <p>Không tìm thấy sản phẩm nào phù hợp.</p>
                </div>
            </div>
        </div>
    </div>

    <th:block th:fragment="page_user_js">
        <script th:src="@{/js/user/index.js}"></script>
    </th:block>
</body>
</html>
