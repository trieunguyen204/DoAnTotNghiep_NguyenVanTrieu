<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="product_card(product)" class="product-card-premium">
    <a th:href="@{/product/{id}(id=${product.id})}">
        <div class="img-wrapper">
            <img th:src="${product.primaryImageUrl != null ? product.primaryImageUrl : '/images/default.jpg'}" th:alt="${product.name}">
            <div class="badge-group">
                <span class="badge sale" th:if="${product.hasPromotion}">GIẢM GIÁ</span>
                <span class="badge new" th:unless="${product.hasPromotion}">MỚI</span>
            </div>
        </div>
        <div class="info">
            <h3 th:text="${product.name}">TÊN SẢN PHẨM</h3>
            <p class="category" th:text="${product.brand}">Thương hiệu</p>
            <p class="price">
                <span class="discount-price" th:if="${product.hasPromotion}" th:text="${#numbers.formatDecimal(product.discountedPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                <del th:if="${product.hasPromotion}" th:text="${#numbers.formatDecimal(product.originalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></del>
                <span class="regular-price" th:unless="${product.hasPromotion}" th:text="${#numbers.formatDecimal(product.originalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
            </p>
        </div>
    </a>
</div>
</body>
</html>
