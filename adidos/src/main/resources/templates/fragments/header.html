<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" >
    <body>
    <header th:fragment="header" class="site-header" id="main-header">
        <div class="container header-inner">
            <a th:href="@{/}" class="logo">ADIDOS</a>

            <nav class="main-nav">
                <ul>
                    <li><a th:href="@{/}">TRANG CHỦ</a></li>

                    <li class="has-mega">
                        <a th:href="@{/}" class="nav-link">DANH MỤC</a>

                        <div class="mega-menu">
                            <div class="mega-inner">

                                <div class="mega-columns">
                                    <div class="mega-col" th:each="cat : ${rootCategories}">
                                        <a class="mega-title"
                                           th:href="@{/category/{id}(id=${cat.id})}"
                                           th:text="${cat.name}">
                                            NAM
                                        </a>

                                        <a th:each="sub : ${cat.subCategories}"
                                           th:href="@{/category/{id}(id=${sub.id})}"
                                           th:text="${sub.name}">
                                            Áo thun
                                        </a>
                                    </div>
                                </div>

                                <div class="mega-banners">
                                    <a href="#" class="mega-banner">
                                        <img src="/images/banner-mega-1.png" alt="Adidos banner">
                                        <div>
                                            <strong>HÀNG MỚI VỀ</strong>
                                            <p>Khám phá bộ sưu tập mới nhất</p>
                                        </div>
                                    </a>

                                    <a href="#" class="mega-banner">
                                        <img src="/images/banner-mega-2.png" alt="Adidos sale">
                                        <div>
                                            <strong>ADICLUB DAYS SALE</strong>
                                            <p>Ưu đãi nổi bật trong tháng</p>
                                        </div>
                                    </a>
                                </div>

                            </div>
                        </div>
                    </li>
                    <li><a th:href="@{/about}">GIỚI THIỆU</a></li>
                </ul>
            </nav>

            <div class="user-actions">
                <form th:action="@{/search}" method="GET" class="luxury-search">
                    <input type="text" name="kw" placeholder="Tìm kiếm">
                    <button type="submit">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </form>

                <div class="action-icon profile-dropdown-container">

                    <!-- Guest -->
                    <a sec:authorize="isAnonymous()" th:href="@{/login}" class="profile-trigger">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                             stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </a>

                    <!-- Logged in -->
                    <div sec:authorize="isAuthenticated()" class="account-dropdown">
                        <a th:href="@{/profile}" class="profile-trigger">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                                 stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </a>

                        <ul class="dropdown-menu">
                            <li><a th:href="@{/profile}">Thông tin tài khoản</a></li>
                            <li><a th:href="@{/profile/addresses}">Quản lý địa chỉ</a></li>
                            <li><a th:href="@{/profile/orders}">Đơn hàng</a></li>
                            <li class="divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button type="submit" class="btn-logout">Đăng xuất</button>
                                </form>
                            </li>
                        </ul>
                    </div>

                </div>

                <a th:href="@{/cart}" class="action-icon cart-wrap">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge" >0</span>
                </a>
            </div>
        </div>
    </header>
    </body>
</html>
