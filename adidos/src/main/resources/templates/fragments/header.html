<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" >
    <body>
    <header th:fragment="header" class="site-header" id="main-header">
        <div class="container header-inner">
            <a th:href="@{/}" class="logo">ADIDOS</a>

            <nav class="main-nav">
                <ul>
                    <li><a th:href="@{/}">TRANG CHỦ</a></li>
                    <li class="has-dropdown" th:each="cat, iterStat : ${rootCategories}" th:if="${iterStat.index < 5}">
                        <a th:href="@{/category/{id}(id=${cat.id})}" th:text="${cat.name}">DANH MỤC</a>
                        <ul class="dropdown">
                            <li th:each="sub : ${cat.subCategories}">
                                <a th:href="@{/category/{id}(id=${sub.id})}" th:text="${sub.name}">Menu con</a>
                            </li>
                            <li class="view-all-item">
                                <a th:href="@{/category/{id}(id=${cat.id})}">Xem tất cả →</a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </nav>

            <div class="user-actions">
                <form th:action="@{/search}" method="GET" class="luxury-search">
                    <input type="text" name="kw" placeholder="Tìm kiếm ...">
                    <button type="submit">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </form>

                <div class="user-actions">
                    <div class="action-icon profile-dropdown-container">
                        <a th:href="@{/profile}" class="action-icon">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </a>


                        <div class="account-wrapper">

                            <!-- Guest -->
                            <a sec:authorize="isAnonymous()" th:href="@{/login}" class="account-icon">
                                <i class="fa fa-user"></i>
                            </a>

                            <!-- Logged in -->
                            <div sec:authorize="isAuthenticated()" class="account-dropdown">
                                <i class="fa fa-user"></i>

                                <ul class="dropdown-menu" sec:authorize="isAuthenticated()">
                                    <li><a th:href="@{/profile}">Thông tin tài khoản</a></li>
                                    <li><a th:href="@{/profile/addresses}">Quản lý địa chỉ</a></li>
                                    <li><a th:href="@{/profile/orders}">Đơn hàng</a></li>
                                    <li class="divider"></li>
                                    <li>
                                        <form th:action="@{/logout}" method="post">
                                            <button type="submit" class="btn-logout">Đăng xuất</button>
                                        </form>
                                    </li>
                                </ul>


                            </div>

                        </div>
                    </div>

                </div>

                <a th:href="@{/cart}" class="action-icon cart-wrap">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge" >0</span>
                </a>
            </div>
        </div>
    </header>
    </body>
</html>
