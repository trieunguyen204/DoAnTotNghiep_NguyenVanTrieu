<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout_user">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title th:replace="~{::page_title ?: _}">Adidos</title>

        <!--css chung-->
        <th:block >
            <link rel="stylesheet" th:href="@{/css/user/header.css}">
            <link rel="stylesheet" th:href="@{/css/user/footer.css}">
            <link rel="stylesheet" th:href="@{/css/user/main.css}">
        </th:block>

        <!--css content-->
        <th:block th:insert="~{::page_user_css}"></th:block>

    </head>

    <body>

        <div th:replace="~{fragments/header :: header}"></div>



        <!-- CONTENT -->
        <main class="main-content">
            <div th:insert="~{::content_user}"></div>
        </main>


        <div th:replace="~{fragments/footer :: footer}"></div>


        <!-- JS chung -->
        <script th:src="@{/js/user/main.js}"></script>

        <!-- JS riêng page -->
        <th:block th:insert="~{::page_user_js}"></th:block>


    </body>
</html>
