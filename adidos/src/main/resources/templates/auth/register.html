<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/user/style.css}">
</head>
<body>
<div th:fragment="content" class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <h2 class="brand-adidos text-dark">ĐĂNG KÝ</h2>
                    <p class="text-muted small">Tạo tài khoản Adidos của bạn</p>
                </div>

                <div th:if="${error}" class="alert alert-dark text-center small py-2" th:text="${error}"></div>

                <form th:action="@{/register}" th:object="${userRequest}" method="post" class="needs-validation" novalidate>
                    <div class="form-floating mb-3">
                        <input type="text" th:field="*{fullName}" class="form-control" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''" id="nameInput" placeholder="Họ và tên" required>
                        <label for="nameInput">Họ và tên</label>
                        <div class="invalid-feedback text-danger small" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" th:field="*{email}" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" id="emailRegInput" placeholder="name@example.com" required>
                        <label for="emailRegInput">Email</label>
                        <div class="invalid-feedback text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="text" th:field="*{phone}" class="form-control" id="phoneInput" placeholder="Số điện thoại">
                        <label for="phoneInput">Số điện thoại</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="password" th:field="*{password}" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" id="passRegInput" placeholder="Password" required minlength="6">
                        <label for="passRegInput">Mật khẩu</label>
                        <div class="invalid-feedback text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <button type="submit" class="btn btn-adidos w-100 mb-3">Đăng ký</button>
                </form>

                <div class="divider"><span>HOẶC</span></div>

                <div class="social-login">
                    <a th:href="@{/oauth2/authorization/facebook}" class="btn btn-social btn-facebook w-100 mb-2">
                        <span class="fb-icon-wrapper">
                            <i class="fab fa-facebook-f"></i>
                        </span>
                        Đăng ký bằng Facebook
                    </a>
                    <a th:href="@{/oauth2/authorization/google}" class="btn btn-social btn-google-dark w-100">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" class="gg-icon">
                        Đăng ký bằng Google
                    </a>
                </div>

                <div class="text-center mt-4 small">
                    Đã có tài khoản? <a th:href="@{/login}" class="text-dark fw-bold">Đăng nhập</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/user/main.js}"></script>
</body>
</html>
