<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Đặt lại mật khẩu | Adidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/user/auth.css}">
</head>

<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <h2 class="brand-adidos text-dark">ĐẶT LẠI MẬT KHẨU</h2>
                    <p class="text-muted small">Tạo mật khẩu mới cho tài khoản của bạn</p>
                </div>

                <div th:if="${success}" class="auth-message success" th:text="${success}"></div>
                <div th:if="${error}" class="auth-message error" th:text="${error}"></div>

                <form th:action="@{/reset-password}" method="post" class="reset-password-form">
                    <input type="hidden" name="token" th:value="${token}">

                    <div class="form-floating mb-3 password-toggle-box">
                        <input type="password"
                               name="password"
                               class="form-control password-input"
                               id="newPassword"
                               placeholder="Mật khẩu mới"
                               minlength="6"
                               required>
                        <label for="newPassword">Mật khẩu mới</label>

                        <button type="button" class="password-toggle-btn">
                            👁
                        </button>
                    </div>

                    <div id="passwordRule" class="password-rules">
                        Mật khẩu tối thiểu 6 ký tự
                    </div>

                    <div class="form-floating mb-3 password-toggle-box">
                        <input type="password"
                               name="confirmPassword"
                               class="form-control password-input"
                               id="confirmPassword"
                               placeholder="Xác nhận mật khẩu"
                               minlength="6"
                               required>
                        <label for="confirmPassword">Xác nhận mật khẩu</label>

                        <button type="button" class="password-toggle-btn">
                            👁
                        </button>
                    </div>

                    <div id="confirmRule" class="password-rules"></div>

                    <button type="submit" class="btn btn-adidos w-100 mb-3">
                        Đổi mật khẩu
                    </button>
                </form>

                <div class="text-center small">
                    <a th:href="@{/login}" class="text-dark fw-bold">
                        ← Quay lại đăng nhập
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/user/auth.js}"></script>
</body>
</html>
