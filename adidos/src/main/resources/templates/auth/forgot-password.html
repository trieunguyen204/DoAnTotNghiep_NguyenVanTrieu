<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Quên mật khẩu | Adidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/user/auth.css}">
</head>

<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <h2 class="brand-adidos text-dark">QUÊN MẬT KHẨU</h2>
                    <p class="text-muted small">Nhập email để nhận liên kết đặt lại mật khẩu</p>
                </div>

                <div th:if="${success}" class="auth-message success" th:text="${success}"></div>
                <div th:if="${error}" class="auth-message error" th:text="${error}"></div>

                <form th:action="@{/forgot-password}" method="post" class="auth-validate-form">
                    <div class="form-floating mb-3">
                        <input type="email"
                               name="email"
                               class="form-control"
                               id="emailInput"
                               placeholder="name@example.com"
                               required>
                        <label for="emailInput">Email</label>
                    </div>

                    <button type="submit" class="btn btn-adidos w-100 mb-3">
                        Gửi email reset
                    </button>
                </form>

                <div class="text-center small">
                    <a th:href="@{/login}" class="text-dark fw-bold">
                        ← Quay lại đăng nhập
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/user/auth.js}"></script>
</body>
</html>
